<div class="mx-auto max-w-7xl px-6 lg:px-8">
  <div class="mx-auto max-w-2xl lg:mx-0">
    <h2 class="text-5xl font-semibold tracking-tight text-white sm:text-7xl">
      Campaigns
    </h2>
    <p class="mt-8 text-lg font-medium text-pretty text-gray-300 sm:text-xl/8">
      Create a new campaign or upload an existing campaign to get started
    </p>
  </div>
  <div class="mx-auto mt-20 max-w-2xl lg:mx-0 lg:max-w-none">
    <dl
      class="mt-16 grid grid-cols-1 gap-8 sm:mt-20 sm:grid-cols-2 lg:grid-cols-3"
    >
      <div class="flex flex-col gap-1">
        <dd class="text-4xl font-semibold tracking-tight text-white mb-5">
          New campaign
        </dd>
        <label for="name" class="block text-sm/6 font-medium text-white"
          >Name</label
        >
        <div class="mt-2 mb-5 w-60">
          <input
            type="text"
            name="name"
            id="name"
            class="input"
            placeholder="My campaign"
            (input)="onName($event)"
          />
        </div>
        <button
          (click)="createNew()"
          type="button"
          class="w-30 cursor-pointer items-center rounded-md bg-indigo-600 px-3 py-2 text-sm font-semibold text-white shadow-xs hover:bg-indigo-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600"
        >
          Create
        </button>
      </div>
      <div class="flex flex-col gap-1">
        <dd class="text-4xl font-semibold tracking-tight text-white mb-5">
          Upload campaign zip
        </dd>
        <div class="col-span-full">
          <div
            class="mt-2 flex justify-center rounded-lg border border-dashed border-white px-6 py-10"
            (dragenter)="onDragEnter($event)"
            (dragover)="onDragOver($event)"
            (dragleave)="onDragLeave($event)"
            (drop)="onDrop($event)"
          >
            <div class="text-center">
              <div class="flex text-sm/6 text-gray-600">
                <label
                  for="zip-upload"
                  class="relative cursor-pointer rounded-md font-semibold text-indigo-600 focus-within:ring-2 focus-within:ring-indigo-600 focus-within:ring-offset-2 focus-within:outline-hidden hover:text-indigo-500"
                >
                  <span>Upload a zip file</span>
                  <input
                    id="zip-upload"
                    name="zip-upload"
                    type="file"
                    accept=".zip"
                    class="sr-only"
                    (change)="onFileSelected($event)"
                  />
                </label>
                <p class="pl-1">or drag and drop</p>
              </div>
              @if (status()) {
              <p [attr.class]="error() ? 'text-red-500' : 'text-green-500'">
                {{ status() }}
              </p>
              }
            </div>
          </div>
        </div>
      </div>
      @if (campaigns().length > 0) {
      <div class="flex flex-col gap-1">
        <dd class="text-4xl font-semibold tracking-tight text-white mb-5">
          Saved campaigns
        </dd>
        <div class="grid grid-cols-1">
          @for (saved of campaigns(); track $index) {
          <div
            class="flex flex-col bg-linear-to-tr hover:cursor-pointer from-[#fff] to-[#776fff] rounded p-3"
            (click)="onCampaign(saved)"
          >
            <span>{{ saved.name }}</span>
          </div>
          }
        </div>
      </div>
      }
    </dl>
  </div>
</div>
