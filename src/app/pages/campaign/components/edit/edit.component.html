<div class="max-w-5xl mx-auto">
  <div class="grid grid-cols-1 lg:grid-cols-2">
    @if (campaign()) {
    <div class="col-span-2 text-center mb-10">
      <h2 class="text-4xl font-semibold tracking-tight text-white sm:text-7xl">
        {{ campaign()!.name }}
      </h2>
    </div>
    <div class="col-span-2 mb-10">
      <div class="grid grid-cols-3 justify-items-center">
        <button
          (click)="navigate('info')"
          type="button"
          [class]="nav() === 'info' ? 'bg-indigo-600' : 'bg-indigo-300'"
          class="w-30 cursor-pointer items-center rounded-md px-3 py-2 text-sm font-semibold text-white shadow-xs hover:bg-indigo-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600"
        >
          Information
        </button>
        <button
          (click)="navigate('nodes')"
          type="button"
          [class]="nav() === 'nodes' ? 'bg-indigo-600' : 'bg-indigo-300'"
          class="w-30 cursor-pointer items-center rounded-md px-3 py-2 text-sm font-semibold text-white shadow-xs hover:bg-indigo-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600"
        >
          Map nodes
        </button>
        <button
          (click)="navigate('preview')"
          type="button"
          [class]="nav() === 'preview' ? 'bg-indigo-600' : 'bg-indigo-300'"
          class="w-30 cursor-pointer items-center rounded-md px-3 py-2 text-sm font-semibold text-white shadow-xs hover:bg-indigo-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600"
        >
          Preview
        </button>
      </div>
    </div>
    @if (nav() === 'info') {
    <div class="col-span-2">
      <campaign-edit-info />
    </div>
    } @if (nav() === 'nodes') {
    <div class="col-span-2">
      <p>NODES</p>
    </div>
    } @if (nav() === 'preview') {
    <div class="col-span-2">
      <p
        class="mt-8 text-lg font-medium text-pretty text-gray-300 sm:text-xl/8"
      >
        {{ campaign()!.desc }}
      </p>
    </div>
    <div>
      <div
        [innerHTML]="campaign()!.bigDesc | tmpro"
        class="mt-8 text-pretty text-gray-300 sm:text-xl/8"
      ></div>
    </div>
    } }
  </div>
</div>
