@if (isVisible()) {
  <div
    class="fixed top-4 left-4 z-[9999] w-100 animate-in slide-in-from-left-5 duration-200"
  >
    <div
      class="bg-gray-900 border border-white/20 rounded-xl shadow-2xl overflow-hidden backdrop-blur-md bg-opacity-95"
    >
      <div
        class="flex items-center justify-between p-4 border-b border-white/10 bg-white/5"
      >
        <h3 class="text-white text-2xl font-bold flex items-center gap-2">
          <span class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></span>
          Stream Config
        </h3>
        <button
          (click)="isVisible.set(false)"
          class="text-gray-400 hover:text-white"
        >
          ✕
        </button>
      </div>
      <div class="p-4 space-y-4 text-sm">
        @if (tournament()) {
          <div>
            <p class="text-white font-medium truncate">
              {{ tournament()!.name }}
            </p>
          </div>
          <div class="pt-2 border-t border-white/10 space-y-2">
            <p class="text-white text-lg font-bold text-center">Match</p>
            <div>
              <select
                class="block text-black w-full rounded-md border-0 bg-white p-2 shadow-sm"
                (change)="selectMatch($event)"
              >
                <option value="" disabled selected>Select match</option>
                @for (match of availableMatches(); track match.id) {
                  <option
                    [value]="match.id"
                    [selected]="currentMatch()?.id === match.id"
                  >
                    Round {{ match.round }} - {{ getPlayerName(match.p1) }} vs
                    {{ getPlayerName(match.p2) }}
                  </option>
                }
              </select>
            </div>
            @if (currentMatch()) {
              <div>
                @if (_match.lobbyStatus()) {
                  <label class="block text-gray-400 mb-1 italic text-xs"
                    >Lobby Status</label
                  >
                  <div class="flex items-center gap-2">
                    <span class="w-1.5 h-1.5 bg-green-400 rounded-full"></span>
                    <span class="text-green-400">{{
                      _match.lobbyStatus()!
                    }}</span>
                  </div>
                } @else {
                  <label class="block text-gray-400 mb-1 italic text-xs"
                    >Lobby Status</label
                  >
                  <div class="flex items-center gap-2">
                    <span class="w-1.5 h-1.5 bg-red-400 rounded-full"></span>
                    <span class="text-red-400">Not connected to lobby</span>
                  </div>
                }
                <div class="grid grid-cols-3 p-2">
                  <div class="flex flex-col justify-center">
                    <p class="text-white text-lg">First pick</p>
                  </div>
                  <div class="col-span-2">
                    <select
                      class="block text-black w-full rounded-md border-0 bg-white p-2 shadow-sm"
                      (change)="selectFirstPick($event)"
                    >
                      <option value="" disabled selected>
                        Select first pick
                      </option>
                      <option
                        [value]="currentMatch()!.p1.id"
                        [selected]="
                          _match.firstPick()?.id === currentMatch()!.p1.id
                        "
                      >
                        {{ currentMatch()!.p1.name }}
                      </option>
                      <option
                        [value]="currentMatch()!.p2.id"
                        [selected]="
                          _match.firstPick()?.id === currentMatch()!.p2.id
                        "
                      >
                        {{ currentMatch()!.p2.name }}
                      </option>
                    </select>
                  </div>
                </div>
                <div class="p-2">
                  <button
                    (click)="_match.resetPB()"
                    class="w-full py-2 bg-red-300/30 hover:cursor-pointer hover:bg-red-300/50 text-white rounded transition-colors"
                  >
                    Reset picks and bans
                  </button>
                </div>
                <div class="p-2">
                  <button
                    (click)="_match.swapPlayers()"
                    class="w-full py-2 bg-white/10 hover:cursor-pointer hover:bg-white/20 text-white rounded transition-colors"
                  >
                    Flip players
                  </button>
                </div>
              </div>
            }
          </div>

          <div class="pt-2 border-t border-white/10 space-y-2">
            <button
              (click)="_tournament.refreshMatches()"
              class="w-full py-2 bg-white/10 hover:cursor-pointer hover:bg-white/20 text-white rounded transition-colors"
            >
              Refresh Matches
            </button>
          </div>
        } @else {
          <div>
            <p class="text-white font-medium truncate">None selected</p>
          </div>
        }
      </div>
    </div>
  </div>
}
