  <tournament-mainbracket
    [matches]="matches() ?? []"
    [players]="players() ?? []"
    [pools]="pools() ?? []"
  />
}

  <tournament-losersbracket
    [matches]="matches() ?? []"
    [players]="players() ?? []"
    [pools]="pools() ?? []"
  />
}
